name: Build Documentation PDF

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-latex-base texlive-fonts-recommended texlive-latex-extra texlive-xetex

      - name: Prepare documentation
        run: |
          echo "# Documentazione" > combined.md
          echo "" >> combined.md
          
          if [ -f README.md ]; then
            cat README.md >> combined.md
            echo -e "\n\n---\n\n" >> combined.md
          fi
          
          find . -type f -name "*.md" ! -name "README.md" ! -name "combined.md" | sort | while read file; do
            echo "## $(basename "$file" .md)" >> combined.md
            echo "" >> combined.md
            cat "$file" >> combined.md
            echo -e "\n\n---\n\n" >> combined.md
          done

      - name: Build PDF
        run: |
          pandoc combined.md \
            -o documentation.pdf \
            --pdf-engine=xelatex \
            --toc \
            --toc-depth=3 \
            -V geometry:margin=1in \
            -V documentclass=article \
            -V fontsize=11pt \
            --highlight-style=tango

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: documentation.pdf
          body: |
            Documentazione aggiornata
            Commit: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation-pdf
          path: documentation.pdf
          retention-days: 90
